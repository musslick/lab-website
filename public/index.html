<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Automated Scientific Discovery Laboratory" />
    <!-- Prevent caching of HTML -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Automated Lab</title>
    <!-- Add Inter font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Version checker - must be at the end of head to see all script tags -->
    <script>
      window.addEventListener('load', function() {
        // Wait for all scripts to load, then check version
        setTimeout(function() {
          var currentVersion = null;
          var scripts = document.getElementsByTagName('script');
          
          for (var i = 0; i < scripts.length; i++) {
            if (scripts[i].src && scripts[i].src.includes('/static/js/main.')) {
              var match = scripts[i].src.match(/main\.([a-f0-9]+)\.js/);
              if (match) {
                currentVersion = match[1];
                break;
              }
            }
          }
          
          if (currentVersion) {
            var storedVersion = localStorage.getItem('app_js_version');
            
            if (storedVersion && storedVersion !== currentVersion) {
              console.log('New version detected: ' + currentVersion + ' (was: ' + storedVersion + ')');
              console.log('Clearing cache and reloading...');
              localStorage.clear();
              sessionStorage.clear();
              localStorage.setItem('app_js_version', currentVersion);
              window.location.reload(true);
            } else if (!storedVersion) {
              console.log('First visit, storing version: ' + currentVersion);
              localStorage.setItem('app_js_version', currentVersion);
            } else {
              console.log('Same version: ' + currentVersion);
            }
          }
        }, 100);
      });
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
